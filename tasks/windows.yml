---
# Tasks for installing Zabbix Agent 2 on Windows

- name: Create download directory
  ansible.windows.win_file:
    path: "{{ zabbix_agent_win_download_path }}"
    state: directory
  tags:
    - zabbix-agent-install
    - directory

- name: Download Zabbix Agent 2 MSI
  ansible.windows.win_get_url:
    url: "https://cdn.zabbix.com/zabbix/binaries/stable/{{ zabbix_agent_version }}/{{ zabbix_agent_win_version }}/zabbix_agent2-{{ zabbix_agent_win_version }}-windows-amd64-openssl.msi"
    dest: "{{ zabbix_agent_win_download_path }}\\zabbix_agent2-{{ zabbix_agent_win_version }}-windows-amd64-openssl.msi"
  tags:
    - zabbix-agent-install
    - download

- name: Uninstall previous Zabbix Agent 2 version
  ansible.windows.win_package:
    product_id: "{{ zabbix_agent_win_uninstall_product_id }}"
    state: absent
  when: zabbix_agent_win_uninstall_product_id | default('') | length > 0
  tags:
    - zabbix-agent-install
    - uninstall

- name: Install Zabbix Agent 2
  ansible.windows.win_package:
    path: "{{ zabbix_agent_win_download_path }}\\zabbix_agent2-{{ zabbix_agent_win_version }}-windows-amd64-openssl.msi"
    state: present
    arguments: >-
      SERVER={{ zabbix_agent_server }}
  tags:
    - zabbix-agent-install
    - install

- name: Configure Zabbix Agent 2
  ansible.windows.win_template:
    src: zabbix_agent2_win.conf.j2
    dest: "{{ zabbix_agent_win_install_path }}\\zabbix_agent2.conf"
  notify: Restart zabbix-agent2 (Windows)
  tags:
    - zabbix-agent-conf
    - conf

- name: Ensure Zabbix Agent 2 service is running
  ansible.windows.win_service:
    name: Zabbix Agent 2
    start_mode: auto
    state: started
  tags:
    - zabbix-enable
    - service

- name: Remove downloaded MSI file
  ansible.windows.win_file:
    path: "{{ zabbix_agent_win_download_path }}\\zabbix_agent2-{{ zabbix_agent_win_version }}-windows-amd64-openssl.msi"
    state: absent
  tags:
    - zabbix-agent-install
    - cleanup
