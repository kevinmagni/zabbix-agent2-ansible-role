---
# Tasks for installing Zabbix Agent 2 on Fedora
# Maps Fedora versions to compatible RHEL repositories

- name: Set compatible RHEL version for Fedora 30-34
  ansible.builtin.set_fact:
    zabbix_rhel_major_version: "8"
  when: (ansible_facts['distribution_major_version'] | int) >= 30 and
        (ansible_facts['distribution_major_version'] | int) < 35

- name: Set compatible RHEL version for Fedora 35-43
  ansible.builtin.set_fact:
    zabbix_rhel_major_version: "9"
  when: (ansible_facts['distribution_major_version'] | int) >= 35 and
        (ansible_facts['distribution_major_version'] | int) <= 43

- name: Set compatible RHEL version for Fedora >= 44
  ansible.builtin.set_fact:
    zabbix_rhel_major_version: "10"
  when: (ansible_facts['distribution_major_version'] | int) >= 44

- name: Fail if Fedora version has no RHEL mapping
  ansible.builtin.fail:
    msg: "Fedora {{ ansible_facts['distribution_major_version'] }} has no RHEL mapping defined for this role."
  when: zabbix_rhel_major_version is not defined

- name: Bootstrap DNF Python libraries for Ansible
  ansible.builtin.raw: |
    if rpm -q python3-libdnf5 >/dev/null 2>&1; then exit 0; fi
    if rpm -q python3-libdnf >/dev/null 2>&1; then exit 0; fi
    dnf -y install python3-libdnf5 || dnf -y install python3-libdnf
  changed_when: false
  tags:
    - zabbix-agent-bootstrap

- name: Install Zabbix repository on Fedora (using compatible RHEL repo)
  ansible.builtin.dnf:
    name: >-
      https://repo.zabbix.com/zabbix/{{ zabbix_agent_version
      }}/rhel/{{ zabbix_rhel_major_version }}/{{
      ansible_architecture }}/zabbix-release-latest-{{
      zabbix_agent_version }}.el{{
      zabbix_rhel_major_version }}.noarch.rpm
    state: present
    disable_gpg_check: true
  tags:
    - zabbix-agent-repo
    - repo

- name: Install Zabbix Agent 2 and plugins
  ansible.builtin.command: dnf -y install zabbix-agent2 zabbix-agent2-plugin-*
  register: _zabbix_dnf_install
  changed_when: "'Nothing to do' not in _zabbix_dnf_install.stdout and 'Nothing to do' not in _zabbix_dnf_install.stderr"
  failed_when: _zabbix_dnf_install.rc != 0
  tags:
    - zabbix-agent-install
    - install-agent

- name: Configure Zabbix Agent 2
  ansible.builtin.template:
    src: zabbix_agent2.conf.j2
    dest: /etc/zabbix/zabbix_agent2.conf
    mode: "0644"
  notify: Restart zabbix-agent2
  tags:
    - zabbix-agent-conf
    - conf

- name: Enable and start Zabbix Agent 2 service
  ansible.builtin.service:
    name: zabbix-agent2
    enabled: true
    state: started
  tags:
    - zabbix-enable
    - service
