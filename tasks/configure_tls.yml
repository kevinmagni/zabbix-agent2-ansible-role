---
# Deploy TLS PSK file when PSK encryption is configured

- name: Deploy Zabbix Agent 2 PSK file
  ansible.builtin.copy:
    content: "{{ zabbix_agent_tls_psk_value }}"
    dest: "{{ zabbix_agent_tls_psk_file }}"
    owner: zabbix
    group: zabbix
    mode: "0600"
  notify: Restart zabbix-agent2
  tags:
    - zabbix-agent-conf
    - tls
