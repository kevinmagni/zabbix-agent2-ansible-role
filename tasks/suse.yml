---
# Tasks for installing Zabbix Agent 2 on SUSE/SLES

- name: Remove existing Zabbix repository if present
  ansible.builtin.include_tasks: preinstall_repo_zypper.yml

- name: Check if Zabbix repository is already installed
  ansible.builtin.command: rpm -q zabbix-release
  register: _zabbix_repo_present
  changed_when: false
  failed_when: false
  check_mode: false

- name: Install Zabbix repository on SUSE
  ansible.builtin.command: >
    rpm -Uvh --nosignature https://repo.zabbix.com/zabbix/{{ zabbix_agent_version }}/sles/{{ ansible_distribution_major_version }}/{{ ansible_architecture }}/zabbix-release-latest-{{ zabbix_agent_version }}.sles{{ ansible_distribution_major_version }}.noarch.rpm
  when: _zabbix_repo_present.rc != 0 and not ansible_check_mode
  tags:
    - zabbix-agent-repo
    - repo

- name: Refresh Zabbix Official Repository
  ansible.builtin.command: zypper --gpg-auto-import-keys refresh 'Zabbix Official Repository'
  changed_when: false
  check_mode: false
  tags:
    - zabbix-agent-upgrade-repo

- name: Install Zabbix Agent 2 and plugins
  community.general.zypper:
    name:
      - zabbix-agent2
      - zabbix-agent2-plugin-*
    state: present
    update_cache: true
  tags:
    - zabbix-agent-install
    - install-agent

- name: Configure Zabbix Agent 2
  ansible.builtin.template:
    src: zabbix_agent2.conf.j2
    dest: /etc/zabbix/zabbix_agent2.conf
    mode: "0644"
  notify: Restart zabbix-agent2
  tags:
    - zabbix-agent-conf
    - conf

- name: Enable and start Zabbix Agent 2 service
  ansible.builtin.service:
    name: zabbix-agent2
    enabled: true
    state: started
  tags:
    - zabbix-enable
    - service
