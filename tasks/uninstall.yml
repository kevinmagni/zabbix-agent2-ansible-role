---
# Uninstall Zabbix Agent 2 - removes package, config, and repository

- name: Stop and disable Zabbix Agent 2 service (Linux)
  ansible.builtin.service:
    name: zabbix-agent2
    state: stopped
    enabled: false
  failed_when: false
  when: ansible_facts['os_family'] != "Windows"
  tags:
    - zabbix-agent-uninstall

- name: Stop Zabbix Agent 2 service (Windows)
  ansible.windows.win_service:
    name: Zabbix Agent 2
    state: stopped
  failed_when: false
  when: ansible_facts['os_family'] == "Windows"
  tags:
    - zabbix-agent-uninstall

- name: Uninstall Zabbix Agent 2 (Windows)
  ansible.windows.win_package:
    product_id: "{{ zabbix_agent_win_uninstall_product_id }}"
    state: absent
  when:
    - ansible_facts['os_family'] == "Windows"
    - zabbix_agent_win_uninstall_product_id | default('') | length > 0
  tags:
    - zabbix-agent-uninstall

- name: Remove Zabbix Agent 2 packages (APT)
  ansible.builtin.apt:
    name:
      - zabbix-agent2
      - zabbix-agent2-plugin-*
    state: absent
    purge: true
  when: ansible_facts['os_family'] == "Debian"
  tags:
    - zabbix-agent-uninstall

- name: Remove Zabbix Agent 2 packages (DNF)
  ansible.builtin.dnf:
    name:
      - zabbix-agent2
      - zabbix-agent2-plugin-*
    state: absent
  when: ansible_facts['os_family'] == "RedHat"
  tags:
    - zabbix-agent-uninstall

- name: Remove Zabbix Agent 2 packages (Zypper)
  community.general.zypper:
    name:
      - zabbix-agent2
      - zabbix-agent2-plugin-*
    state: absent
  when: ansible_facts['os_family'] == "Suse"
  tags:
    - zabbix-agent-uninstall

- name: Remove Zabbix repository package (APT)
  ansible.builtin.apt:
    name: zabbix-release
    state: absent
    purge: true
  when: ansible_facts['os_family'] == "Debian"
  tags:
    - zabbix-agent-uninstall

- name: Remove Zabbix repository package (DNF)
  ansible.builtin.dnf:
    name: zabbix-release
    state: absent
  when: ansible_facts['os_family'] == "RedHat"

- name: Remove Zabbix repository package (Zypper)
  community.general.zypper:
    name: zabbix-release
    state: absent
  when: ansible_facts['os_family'] == "Suse"
  tags:
    - zabbix-agent-uninstall

- name: Remove Zabbix Agent 2 configuration directory
  ansible.builtin.file:
    path: /etc/zabbix
    state: absent
  tags:
    - zabbix-agent-uninstall

- name: Remove Zabbix Agent 2 log directory
  ansible.builtin.file:
    path: /var/log/zabbix
    state: absent
  tags:
    - zabbix-agent-uninstall
