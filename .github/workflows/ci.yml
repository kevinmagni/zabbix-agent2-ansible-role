---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python environment
        run: |
          uv venv .venv
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: uv pip install yamllint ansible-lint ansible

      - name: Install required collections
        run: |
          ansible-galaxy collection install community.general
          ansible-galaxy collection install ansible.posix

      - name: Run yamllint
        run: yamllint .

      - name: Run ansible-lint
        run: ansible-lint

  syntax:
    name: Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python environment
        run: |
          uv venv .venv
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Install Ansible
        run: uv pip install ansible

      - name: Install required collections
        run: |
          ansible-galaxy collection install community.general
          ansible-galaxy collection install ansible.posix

      - name: Syntax check
        run: ansible-playbook tests/test.yml -i tests/inventory.ini --syntax-check

  molecule:
    name: Molecule
    runs-on: ubuntu-latest
    needs: [lint, syntax]
    strategy:
      fail-fast: false
      matrix:
        distro:
          - ubuntu2204
          - debian12
          - rockylinux9
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python environment
        run: |
          uv venv .venv
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: uv pip install ansible molecule 'molecule-plugins[docker]'

      - name: Install required collections
        run: |
          ansible-galaxy collection install community.general
          ansible-galaxy collection install ansible.posix

      - name: Run Molecule tests
        run: molecule test
        env:
          MOLECULE_DISTRO: ${{ matrix.distro }}

  release:
    name: Publish to Galaxy
    runs-on: ubuntu-latest
    needs: [lint, molecule]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: ansible-galaxy
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install Python and create venv
        run: |
          uv python install 3.12
          uv venv .venv --python 3.12
          echo "${{ github.workspace }}/.venv/bin" >> "$GITHUB_PATH"

      - name: Install Ansible
        run: uv pip install --python .venv ansible-core

      - name: Import role to Ansible Galaxy
        run: >-
          ansible-galaxy role import
          --token "${{ secrets.ANSIBLE_GALAXY_API_TOKEN }}"
          --role-name zabbix_agent2
          "${{ github.repository_owner }}"
          "${{ github.event.repository.name }}"
