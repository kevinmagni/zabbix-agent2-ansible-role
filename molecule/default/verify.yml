---
- name: Verify
  hosts: all
  become: true
  tasks:
    - name: Check that zabbix-agent2 package is installed
      ansible.builtin.package:
        name: zabbix-agent2
        state: present
      check_mode: true
      register: _pkg_check
      failed_when: _pkg_check.changed

    - name: Check that zabbix-agent2 service is running
      ansible.builtin.service:
        name: zabbix-agent2
        state: started
      check_mode: true
      register: _svc_check
      failed_when: _svc_check.changed

    - name: Check that configuration file exists
      ansible.builtin.stat:
        path: /etc/zabbix/zabbix_agent2.conf
      register: _conf_stat
      failed_when: not _conf_stat.stat.exists

    - name: Check that Server is configured correctly
      ansible.builtin.command: grep -q "Server=127.0.0.1" /etc/zabbix/zabbix_agent2.conf
      changed_when: false

    - name: Check that HostMetadata is configured correctly
      ansible.builtin.command: grep -q "HostMetadata=molecule-test" /etc/zabbix/zabbix_agent2.conf
      changed_when: false
